name: Actualizar Blacklist DNS

on:
  schedule:
    # Todos los dias a las 03:00 UTC (00:00 Argentina)
    - cron: "0 3 * * *"
  workflow_dispatch: # Permite ejecucion manual desde GitHub

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generar blacklist
        run: python3 Fase1/CCR2004/generate-blacklist.py --max-domains 500000 --output blacklist-dns.rsc

      - name: Publicar en rama blacklist
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Crear rama huerfana (sin historial, evita que el repo crezca)
          git checkout --orphan blacklist
          git rm -rf . 2>/dev/null || true
          git checkout HEAD -- . 2>/dev/null || true

          # Solo mantener el archivo generado
          mv blacklist-dns.rsc /tmp/blacklist-dns.rsc
          git rm -rf . 2>/dev/null || true
          mv /tmp/blacklist-dns.rsc blacklist-dns.rsc
          git add blacklist-dns.rsc

          git commit -m "Blacklist DNS - $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push origin blacklist --force
